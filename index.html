        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.3), 0 4px 12px rgba(79, 70, 229, 0.5);
    }
    25%, 75% {
        box-shadow: 0 0 0 6px rgba(79, 70, 229, 0.6), 0 8px 24px rgba(79, 70, 229, 0.8);
    }
    50% {
        box-shadow: 0 0 0 8px rgba(79, 70, 229, 0.8), 0 12px 32px rgba(79, 70, 229, 1);
    }
}

/* Mobile responsive */
@media (max-width: 768px) {
    .timeline-drawer {
        width: 100%;
        right: -100%;
    }
}

/* Mobile Landscape - Half Screen Drawer */
@media (max-width: 1024px) and (orientation: landscape) {
    .timeline-drawer {
        width: 50%;
        max-width: 400px;
        right: -50%;
    }
    
    .timeline-drawer.active {
        right: 0;
    }
    
    .timeline-drawer-header {
        padding: 12px 16px;
    }
    
    .timeline-drawer-header h3 {
        font-size: 16px;
    }
    
    .timeline-content {
        padding: 12px;
    }
    
    .timeline-slide {
        margin-bottom: 12px;
        border-radius: 10px;
    }
    
    .timeline-slide-thumbnail {
        aspect-ratio: 16/9;
    }
    
    .timeline-slide-thumbnail img {
        object-fit: contain;
        background: #000;
    }
    
    .timeline-slide-time {
        bottom: 6px;
        right: 6px;
        padding: 3px 6px;
        font-size: 11px;
    }
    
    .timeline-slide-playing-indicator {
        width: 36px;
        height: 36px;
    }
}

/* Small Mobile Landscape - Compact Drawer */
@media (max-width: 768px) and (orientation: landscape) {
    .timeline-drawer {
        width: 55%;
        max-width: 350px;
    }
    
    .timeline-drawer-header {
        padding: 10px 14px;
    }
    
    .timeline-drawer-header h3 {
        font-size: 15px;
    }
    
    .timeline-close-btn {
        padding: 6px;
    }
    
    .timeline-close-btn svg {
        width: 18px;
        height: 18px;
    }
    
    .timeline-content {
        padding: 10px;
    }
    
    .timeline-slide {
        margin-bottom: 10px;
        border-radius: 8px;
    }
    
    .timeline-slide-thumbnail {
        aspect-ratio: 16/9;
    }
    
    .timeline-slide-time {
        bottom: 4px;
        right: 4px;
        padding: 2px 5px;
        font-size: 10px;
    }
    
    .timeline-slide-playing-indicator {
        width: 32px;
        height: 32px;
    }
}

/* Extra Small Mobile Landscape */
@media (max-width: 640px) and (orientation: landscape) and (max-height: 500px) {
    .timeline-drawer {
        width: 60%;
        max-width: 320px;
    }
    
    .timeline-drawer-header {
        padding: 8px 12px;
    }
    
    .timeline-drawer-header h3 {
        font-size: 14px;
    }
    
    .timeline-content {
        padding: 8px;
    }
    
    .timeline-slide {
        margin-bottom: 8px;
        border-radius: 6px;
    }
    
    .timeline-slide-thumbnail {
        aspect-ratio: 16/9;
    }
    
    .timeline-slide-thumbnail img {
        object-fit: contain;
    }
    
    .timeline-slide-time {
        bottom: 3px;
        right: 3px;
        padding: 2px 4px;
        font-size: 9px;
    }
    
    .timeline-slide-playing-indicator {
        width: 28px;
        height: 28px;
    }
    
    .timeline-slide-playing-indicator svg {
        width: 14px;
        height: 14px;
    }
}

/* Fullscreen support */
.plyr--fullscreen .timeline-drawer {
    z-index: 10001;
}

/* Fullscreen Landscape - Half Screen */
.plyr--fullscreen.plyr--landscape .timeline-drawer {
    width: 45%;
    max-width: 450px;
}
